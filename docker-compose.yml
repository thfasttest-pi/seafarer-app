# =============================================================================
# SEAFARER APP — Docker Compose (Development)
# =============================================================================
# Usage: docker compose up -d
# DATABASE_URL=postgresql+asyncpg://postgres:password@localhost:5432/seafarer
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: seafarer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: seafarer
    ports:
      - "5432:5432"
    volumes:
      - seafarer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  seafarer_pgdata:
